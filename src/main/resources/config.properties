# ============================================
# Network Cache Management System - 客户端配置
# ============================================

# 默认服务器连接配置
server.default.host=127.0.0.1
server.default.port=6379

# 连接超时（毫秒）
server.connect.timeout=5000

# 自动重连（true/false）
server.auto.reconnect=true
server.reconnect.interval=3000

# 本地 Mock 模式的模拟缓存容量上限
mock.cache.max.entries=10000

# UI 配置
ui.refresh.interval=3000
ui.max.display.entries=5000
